<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracen-Odon | Registro de Capacitación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans">

    <div class="max-w-md w-full p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 mx-4">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/50">
                <i class="fas fa-robot text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Tracen-Odon</h1>
            <p class="text-slate-400 mt-2">Sistema de Gestión de Usuarios</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Nombre de Usuario</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="fas fa-user"></i>
                    </span>
                    <input id="user" type="text" placeholder="Ej: Octane_Main" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-slate-600">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input id="pass" type="password" placeholder="••••••••" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-slate-600">
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="enviar('registrar')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-blue-900/20 active:scale-95">
                    Registrar
                </button>
                <button onclick="enviar('login')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-colors active:scale-95">
                    Entrar
                </button>
            </div>
        </div>

        <div id="mensaje" class="mt-6 text-center text-sm font-medium p-3 rounded-lg hidden"></div>
        
        <footer class="mt-8 text-center text-slate-500 text-xs uppercase tracking-widest">
            Proyecto Universitario &copy; 2026
        </footer>
    </div>

    <script>
        // --- ⚠️ REEMPLAZA ESTO CON TU LINK DE RAILWAY ⚠️ ---
        const BASE_URL = "https://tracen-odon-production.up.railway.app";

        async function enviar(ruta) {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const msjBox = document.getElementById('mensaje');

            if(!user || !pass) {
                mostrarMensaje("Faltan datos", "bg-red-900/50 text-red-300");
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/${ruta}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user, pass})
                });
                const data = await res.json();
                
                if(data.status === "success") {
                    mostrarMensaje(data.mensaje, "bg-green-900/50 text-green-300 border border-green-800");
                } else {
                    mostrarMensaje(data.mensaje, "bg-red-900/50 text-red-300 border border-red-800");
                }
            } catch (err) {
                mostrarMensaje("Servidor apagado o error de red", "bg-amber-900/50 text-amber-300");
            }
        }

        function mostrarMensaje(texto, clases) {
            const msjBox = document.getElementById('mensaje');
            msjBox.innerText = texto;
            msjBox.className = "mt-6 text-center text-sm font-medium p-3 rounded-lg " + clases;
            msjBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
