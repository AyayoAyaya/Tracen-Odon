<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de Capacitación</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        /* Pestañas para cambiar entre Login y Registro */
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; cursor: pointer; }
        .tab { flex: 1; padding: 10px; color: #888; transition: 0.3s; }
        .active-tab { color: #007bff; border-bottom: 2px solid #007bff; font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        
        /* Mensaje de error dinámico */
        #msg { margin-top: 15px; font-size: 14px; min-height: 20px; }
        
        /* Panel que se muestra al entrar */
        #trainingPanel { display: none; width: 90%; max-width: 800px; background: white; padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>

    <!-- CAJA DE AUTENTICACIÓN -->
    <div id="authBox" class="card">
        <div class="tabs">
            <div id="tLogin" class="tab active-tab" onclick="switchMode('login')">Entrar</div>
            <div id="tReg" class="tab" onclick="switchMode('reg')">Registrarse</div>
        </div>
        
        <h2 id="formTitle">Bienvenido</h2>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnAction" onclick="handleSubmit()">Ingresar al Sistema</button>
        <div id="msg"></div>
    </div>

    <!-- PANEL DE CAPACITACIÓN (OCULTO POR DEFECTO) -->
    <div id="trainingPanel">
        <h1>🎓 Portal de Capacitación</h1>
        <hr>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div style="border: 2px solid #eef; padding: 15px; border-radius: 10px;">
                <h3>Módulo 1: Seguridad</h3>
                <button onclick="alert('Abriendo curso...')">Comenzar</button>
            </div>
            <div style="border: 2px solid #eef; padding: 15px; border-radius: 10px;">
                <h3>Módulo 2: Herramientas</h3>
                <button onclick="alert('Próximamente')">Bloqueado</button>
            </div>
        </div>
    </div>

    <script>
        let mode = 'login';
        
        // --- ⚠️ REEMPLAZA ESTO CON EL LINK AZUL DE COLAB ⚠️ ---
        const BASE_URL = "https://overskeptical-unnominally-maurita.ngrok-free.dev"; 

        // Función para cambiar visualmente entre Registrar y Loguear
        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('tLogin').className = mode === 'login' ? 'tab active-tab' : 'tab';
            document.getElementById('tReg').className = mode === 'reg' ? 'tab active-tab' : 'tab';
            document.getElementById('formTitle').innerText = mode === 'login' ? 'Bienvenido' : 'Nueva Cuenta';
            document.getElementById('btnAction').innerText = mode === 'login' ? 'Ingresar al Sistema' : 'Crear Usuario';
            document.getElementById('msg').innerText = "";
        }

        // Función que envía los datos a Google Colab
        async function handleSubmit() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msgDiv = document.getElementById('msg');
            
            msgDiv.innerText = "Procesando...";
            msgDiv.style.color = "#666";

            // Decide a qué URL ir según el modo
            const endpoint = mode === 'login' ? '/login' : '/registrar';

            try {
                const response = await fetch(BASE_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: user, pass: pass })
                });

                const data = await response.json();

                if (data.status === "success") {
                    if (mode === 'login') {
                        // EXITOSO: Oculta el login y muestra el panel
                        document.getElementById('authBox').style.display = 'none';
                        document.getElementById('trainingPanel').style.display = 'block';
                        document.body.style.background = "#eef2f3";
                    } else {
                        // REGISTRO EXITOSO: Avisa y cambia a modo login
                        msgDiv.style.color = "green";
                        msgDiv.innerText = "¡Cuenta creada! Ahora intenta entrar.";
                        setTimeout(() => switchMode('login'), 2000);
                    }
                } else {
                    // ERROR: Muestra el mensaje rojo debajo del botón
                    msgDiv.style.color = "red";
                    msgDiv.innerText = data.mensaje;
                }
            } catch (error) {
                msgDiv.style.color = "red";
                msgDiv.innerText = "Error: Verifica que Colab esté encendido.";
            }
        }
    </script>
</body>
</html>
