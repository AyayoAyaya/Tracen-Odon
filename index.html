<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación Dobot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex items-center justify-center p-4">

    <div id="app-container" class="max-w-4xl w-full">
        
        <div id="view-login" class="max-w-md mx-auto bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
            <h2 class="text-3xl font-bold text-center mb-6 text-blue-400">Capacitación Dobot</h2>
            <div class="space-y-4">
                <input id="login-user" type="text" placeholder="Usuario" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition-all">Ingresar</button>
                <p class="text-center text-sm text-slate-400">¿No tienes una cuenta? <button onclick="showView('view-register')" class="text-blue-400 hover:underline">Crea Una</button></p>
            </div>
        </div>

        <div id="view-register" class="hidden max-w-md mx-auto bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
            <h2 class="text-2xl font-bold text-center mb-6">Registrarse</h2>
            <div class="space-y-4">
                <input id="reg-user" type="text" placeholder="Usuario" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="reg-pass" type="password" placeholder="Contraseña" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input id="reg-pass2" type="password" placeholder="Repetir Contraseña" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                
                <div class="text-xs text-slate-400 space-y-1 px-1">
                    <p id="req-len">• Mínimo 8 caracteres</p>
                    <p id="req-spec">• Al menos un carácter especial (@$!%*?&)</p>
                </div>

                <button onclick="register()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold transition-all">Crear Cuenta</button>
                <button onclick="showView('view-login')" class="w-full text-slate-400 text-sm hover:underline">Volver al Login</button>
            </div>
        </div>

        <div id="view-courses" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">Cursos Disponibles</h2>
                <button onclick="showView('view-login')" class="bg-red-900/30 text-red-400 px-4 py-2 rounded-lg hover:bg-red-900/50">Salir</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-blue-500 transition-all cursor-pointer group">
                    <div class="w-12 h-12 bg-blue-600/20 rounded-lg flex items-center justify-center mb-4 group-hover:bg-blue-600 transition-colors">
                        <i class="fas fa-microchip text-blue-400 group-hover:text-white"></i>
                    </div>
                    <h3 class="font-bold text-xl mb-2">Intro a Dobot</h3>
                    <p class="text-slate-400 text-sm">Aprende los movimientos básicos del brazo robótico.</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 opacity-50">
                    <h3 class="font-bold text-xl mb-2">Python Avanzado</h3>
                    <p class="text-slate-400 text-sm">Proximamente...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- CONFIGURACIÓN ---
const BASE_URL = "https://tu-url-de-railway.app"; // Reemplaza con la tuya

// Función para cambiar de "página" (vista)
function showView(viewId) {
    document.getElementById('view-login').classList.add('hidden');
    document.getElementById('view-register').classList.add('hidden');
    document.getElementById('view-courses').classList.add('hidden');
    document.getElementById(viewId).classList.remove('hidden');
    // Limpiamos mensajes al cambiar de vista
    document.querySelectorAll('.mensaje-box').forEach(el => el.classList.add('hidden'));
}

// FUNCIÓN PARA LOGUEARSE (Ahora sí valida)
async function login() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;

    if (!user || !pass) {
        mostrarError('view-login', "Debes completar todos los campos");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user, pass})
        });
        const data = await res.json();

        if (data.status === "success") {
            showView('view-courses'); // Solo entra si el servidor dice OK
        } else {
            mostrarError('view-login', data.mensaje);
        }
    } catch (err) {
        mostrarError('view-login', "Error: El servidor no responde");
    }
}

// FUNCIÓN PARA REGISTRARSE
async function register() {
    const user = document.getElementById('reg-user').value;
    const p1 = document.getElementById('reg-pass').value;
    const p2 = document.getElementById('reg-pass2').value;

    if (p1 !== p2) {
        mostrarError('view-register', "Las contraseñas no coinciden");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user, pass: p1})
        });
        const data = await res.json();

        if (data.status === "success") {
            // En lugar de alert, mostramos éxito y volvemos al login tras 2 segundos
            mostrarExito('view-register', "¡Cuenta creada! Redirigiendo...");
            setTimeout(() => showView('view-login'), 2000);
        } else {
            mostrarError('view-register', data.mensaje);
        }
    } catch (err) {
        mostrarError('view-register', "Error de conexión con el servidor");
    }
}

// Funciones para mostrar mensajes sin Pop-ups (usando el div de mensaje)
function mostrarError(containerId, texto) {
    const box = document.querySelector(`#${containerId} .mensaje-box`);
    box.innerText = texto;
    box.className = "mensaje-box mt-4 p-3 rounded-lg bg-red-900/50 text-red-300 text-sm border border-red-800";
}

function mostrarExito(containerId, texto) {
    const box = document.querySelector(`#${containerId} .mensaje-box`);
    box.innerText = texto;
    box.className = "mensaje-box mt-4 p-3 rounded-lg bg-green-900/50 text-green-300 text-sm border border-green-800";
}
    </script>
</body>
</html>
